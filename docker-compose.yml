# Whale2API gateway + SQLite pool DB + pool management WebUI.
# Usage: copy .env.example → .env, then: docker compose up -d --build
#
# Container names are fixed (whale2api / poolui). Default Compose naming would be
# {project-dir}_{service}_{index}, e.g. ds2api-new-whale2api-1.

name: whale2api

services:
  whale2api:
    container_name: whale2api
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    image: whale2api:latest
    ports:
      - "${WHALE2API_HOST_PORT:-5103}:5001"
    environment:
      PORT: "5001"
      WHALE2API_DATABASE_PATH: /data/whale2api.db
    env_file:
      - .env
    volumes:
      - ./docker-data/whale2api:/data
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/busybox",
          "wget",
          "-q",
          "-O-",
          "http://127.0.0.1:5001/healthz",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  poolui:
    container_name: poolui
    image: whale2api:latest
    depends_on:
      whale2api:
        condition: service_started
    command: ["/usr/local/bin/poolui"]
    ports:
      - "${POOL_UI_HOST_PORT:-5010}:5010"
    environment:
      POOL_UI_PORT: "5010"
      WHALE2API_DATABASE_PATH: /data/whale2api.db
    env_file:
      - .env
    volumes:
      - ./docker-data/whale2api:/data
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/busybox",
          "wget",
          "-q",
          "-O-",
          "http://127.0.0.1:5010/healthz",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
